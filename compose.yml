version: "3.9"

services:

  devopsdb:
    image: avinash9394/automation:db

    ports:
      - "3306:3306"

    deploy:
      replicas: 1

    networks:
      - mynetwork

    volumes:
      - dbdata:/var/lib/mysql

  application:
    image: avinash9394/automation:app

    ports:
      - "1111:8080"

    deploy:
      replicas: 1

    depends_on:
      - devopsdb

    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay

volumes:
  dbdata:
